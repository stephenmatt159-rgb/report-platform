<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Contact Form</title>
</head>

<body class="bg-gray-100 h-screen flex items-center justify-center">

    <!-- Toast Container -->
    <div id="toast"
        class="fixed top-5 right-5 z-50 hidden p-4 rounded shadow-lg text-white text-sm transition-all duration-500">
    </div>

    <div class="bg-white p-6 rounded shadow-md w-96">
        <h2 class="text-xl font-semibold mb-4">Contact reportplaform</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" class="w-full mb-2 p-2 border rounded" required />
            <input type="email" id="email" placeholder="Your Email" class="w-full mb-2 p-2 border rounded" required />
            <input type="tel" id="phone" placeholder="Your Phone" class="w-full mb-2 p-2 border rounded" required />
            <input type="text" id="subject" placeholder="A Subject" class="w-full mb-2 p-2 border rounded" required />
            <textarea id="message" placeholder="Your Message" class="w-full mb-2 p-2 border rounded"
                required></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Send</button>
        </form>
        <p id="responseMessage" class="mt-2 text-sm text-gray-600"></p>
    </div>

    <script>
        const toast = document.getElementById("toast");

        function showToast(message, isSuccess = true) {
            toast.textContent = message;
            toast.className = `fixed top-5 right-5 z-50 p-4 rounded shadow-lg text-white text-sm transition-all duration-500 ${isSuccess ? "bg-green-500" : "bg-red-500"
                }`;
            toast.classList.remove("hidden");

            setTimeout(() => {
                toast.classList.add("hidden");
            }, 3000);
        }

        document.getElementById("contactForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const subject = document.getElementById("subject").value;
            const message = document.getElementById("message").value;

            try {
                const response = await fetch("/api/mail/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, phone, message, subject })
                });

                const result = await response.json();

                document.getElementById("responseMessage").innerText = result.message;

                if (response.ok) {
                    showToast("Message sent successfully!", true);
                    document.getElementById("contactForm").reset();
                } else {
                    showToast(result.message || "Something went wrong.", false);
                }
            } catch (error) {
                showToast("Failed to send message. Please try again later.", false);
            }
        });
    </script>
</body>

</html>
