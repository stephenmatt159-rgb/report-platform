<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form Submission</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="font-family: Arial, sans-serif; line-height: 1.6">
    <div>
      <h2>📬 reportplaform Contact Form</h2>

      <ul style="list-style: none; padding: 0; margin: 0">
        <li style="margin: 12px 0"><strong>Name:</strong> {{name}}</li>
        <li style="margin: 12px 0"><strong>Subject:</strong> {{subject}}</li>
        <li style="margin: 12px 0"><strong>Email:</strong> {{email}}</li>
        <li style="margin: 12px 0"><strong>Phone:</strong> {{phone}}</li>
      </ul>

      <p style="margin: 24px 0 8px; font-weight: bold">Message:</p>
      <div style="padding: 16px; border-radius: 6px; background: #f5f5f5">
        {{message}}
      </div>
    </div>
  </body>
</html>
